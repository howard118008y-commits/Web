<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>房貸試算表｜鋮馨租賃</title>
<link rel="stylesheet" href="style.css">
<style>
/* 計算機/工具頁專屬 nav 樣式（覆蓋 style.css） */
nav{background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:.5px solid rgba(0,0,0,.08);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
img.nav-logo{height:44px;width:44px;object-fit:cover;border-radius:8px;border:1px solid rgba(0,0,0,.06);display:inline-block}
.nav-back{font-size:14px;color:#16A34A;text-decoration:none;font-weight:500}

/* NAV */
nav{background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:.5px solid rgba(0,0,0,.08);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}


.nav-back{font-size:14px;color:#7C3AED;text-decoration:none;font-weight:500}


/* HERO — purple→blue gradient */
.hero{background:linear-gradient(135deg,#7C3AED 0%,#2563EB 60%,#16A34A 100%);padding:60px 24px 44px;text-align:center}

.eyebrow{font-size:12px;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}

.hero h1{font-size:44px;font-weight:700;letter-spacing:-.03em;line-height:1.1;margin-bottom:14px;color:#fff}

.hero p{font-size:17px;color:rgba(255,255,255,.82);max-width:480px;margin:0 auto}

@media(max-width:768px){
  .hero h1{font-size:32px}
}


.calc-wrap{max-width:760px;margin:40px auto;padding:0 20px 80px}


.card{background:#fff;border-radius:20px;padding:32px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,.06)}

.card-title{font-size:12px;font-weight:600;color:#6e6e73;letter-spacing:.07em;text-transform:uppercase;margin-bottom:24px}


.field{margin-bottom:24px}

.field label{display:block;font-size:15px;font-weight:600;color:#1d1d1f;margin-bottom:8px}

.field-note{font-size:12px;color:#6e6e73;margin-bottom:8px}

.input-row{display:flex;align-items:center;gap:10px}

.input-row input[type=number]{flex:1;height:48px;border:1.5px solid #d2d2d7;border-radius:10px;padding:0 14px;font-size:16px;color:#1d1d1f;transition:border-color .2s;outline:none;background:#fff}

.input-row input[type=number]:focus{border-color:#7C3AED}

.unit{font-size:14px;color:#6e6e73;white-space:nowrap;min-width:28px}


input[type=range]{width:100%;-webkit-appearance:none;height:4px;border-radius:2px;background:#e8e8ed;outline:none;cursor:pointer;margin-top:10px}

input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#2563EB);cursor:pointer;box-shadow:0 2px 6px rgba(124,58,237,.4)}

.range-labels{display:flex;justify-content:space-between;font-size:11px;color:#6e6e73;margin-top:4px}


/* TABS — purple accent */
.tabs{display:flex;gap:8px;margin-bottom:24px;background:#f5f5f7;border-radius:12px;padding:4px}

.tab{flex:1;padding:9px;text-align:center;font-size:14px;font-weight:500;color:#6e6e73;border-radius:9px;cursor:pointer;border:none;background:transparent;transition:all .2s}

.tab.active{background:#fff;color:#7C3AED;font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.1)}


/* RESULTS */
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}

@media(max-width:500px){
  .result-grid{grid-template-columns:1fr}
}

.result-card{background:#f5f5f7;border-radius:14px;padding:20px 16px;text-align:center}

.result-card.hl-purple{background:linear-gradient(135deg,#7C3AED,#2563EB);color:#fff}

.result-card.hl-green{background:#16A34A;color:#fff}

.result-label{font-size:12px;color:#6e6e73;margin-bottom:6px}

.result-card.hl-purple .result-label,.result-card.hl-green .result-label{color:rgba(255,255,255,.75)}

.result-value{font-size:26px;font-weight:700;color:#1d1d1f;letter-spacing:-.02em}

.result-card.hl-purple .result-value,.result-card.hl-green .result-value{color:#fff}

.result-sub{font-size:11px;color:#6e6e73;margin-top:4px}

.result-card.hl-purple .result-sub,.result-card.hl-green .result-sub{color:rgba(255,255,255,.65)}


/* COMPARE */
.compare-section{margin-top:28px}

.compare-title{font-size:15px;font-weight:600;color:#1d1d1f;margin-bottom:14px}

.compare-bar-wrap{margin-bottom:14px}

.compare-label-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}

.bar-track{background:#e8e8ed;border-radius:4px;height:10px;overflow:hidden}

.bar-fill{height:100%;border-radius:4px;transition:width .6s ease}

.bar-blue{background:linear-gradient(90deg,#7C3AED,#2563EB)}

.bar-red{background:#ff3b30}

.saving-box{background:#f0fdf4;border:1.5px solid #16A34A;border-radius:12px;padding:16px;margin-top:12px;text-align:center}

.saving-val{font-size:32px;font-weight:700;color:#16A34A}


/* TABLE */
.amort-table-wrap{overflow-x:auto;margin-top:16px}

table{width:100%;border-collapse:collapse;font-size:13px}

th{background:#f5f5f7;padding:10px 12px;text-align:right;font-weight:600;color:#6e6e73;border-bottom:1px solid #e8e8ed}

th:first-child{text-align:center}

td{padding:10px 12px;text-align:right;border-bottom:.5px solid #f0f0f0;color:#1d1d1f}

td:first-child{text-align:center;color:#6e6e73}

tr:last-child td{border-bottom:none}

tr:hover td{background:#fafafa}


/* CTA */
.cta-strip{background:linear-gradient(135deg,#1d1d1f 0%,#2d1b5e 100%);border-radius:20px;padding:40px 28px;text-align:center;margin-top:24px}

.cta-strip h3{font-size:24px;font-weight:700;color:#fff;margin-bottom:10px;letter-spacing:-.02em}




.btn-purple{background:#7C3AED;color:#fff;padding:12px 24px;border-radius:980px;font-size:15px;font-weight:600;text-decoration:none;display:inline-block}
</style>
  <script src="include.js" defer></script>

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<meta property="og:image" content="https://cx468.com.tw/favicon-512.png">
<meta property="og:site_name" content="鋮馨租賃有限公司">
<meta property="og:type" content="website">
<link rel="canonical" href="https://cx468.com.tw/mortgage-calculator.html">
<meta property="og:title" content="房貸試算表｜鋮馨租賃">
<meta property="og:url" content="https://cx468.com.tw/mortgage-calculator.html">
</head>
<body>

<div data-include="nav-tool"></div>

<div class="hero">
  <p class="eyebrow">Mortgage Calculator</p>
  <h1>房貸試算表</h1>
  <p>輸入貸款金額、利率與年限，立即計算每月還款與總利息。</p>
</div>

<div class="calc-wrap">

  <div class="card">
    <div class="card-title">輸入條件</div>

    <div class="tabs">
      <button class="tab active" onclick="setMode('bank')">銀行貸款試算</button>
      <button class="tab" onclick="setMode('private')">民間 vs 銀行對比</button>
    </div>

    <div class="field">
      <label>貸款金額</label>
      <div class="input-row">
        <input type="number" id="amount" value="300" min="10" max="5000" step="10" oninput="syncSlider('amount','amountSlider');calculate()">
        <span class="unit">萬元</span>
      </div>
      <input type="range" id="amountSlider" min="50" max="2000" step="10" value="300" oninput="syncInput('amountSlider','amount');calculate()">
      <div class="range-labels"><span>50萬</span><span>2000萬</span></div>
    </div>

    <div class="field">
      <label>年利率</label>
      <div class="input-row">
        <input type="number" id="rate" value="2.95" min="0.1" max="30" step="0.05" oninput="syncSlider('rate','rateSlider');calculate()">
        <span class="unit">%</span>
      </div>
      <input type="range" id="rateSlider" min="0.5" max="20" step="0.05" value="2.95" oninput="syncInput('rateSlider','rate');calculate()">
      <div class="range-labels"><span>0.5%</span><span>20%</span></div>
    </div>

    <div class="field">
      <label>貸款年限</label>
      <div class="input-row">
        <input type="number" id="years" value="20" min="1" max="40" step="1" oninput="syncSlider('years','yearsSlider');calculate()">
        <span class="unit">年</span>
      </div>
      <input type="range" id="yearsSlider" min="1" max="40" step="1" value="20" oninput="syncInput('yearsSlider','years');calculate()">
      <div class="range-labels"><span>1年</span><span>40年</span></div>
    </div>

    <div id="privateField" style="display:none">
      <div class="field">
        <label>民間借款月利率</label>
        <div class="field-note">民間借款通常月利率 1–3%（年利率 12–36%）</div>
        <div class="input-row">
          <input type="number" id="privateRate" value="1.5" min="0.1" max="5" step="0.1" oninput="calculate()">
          <span class="unit">%／月</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 結果 -->
  <div class="card">
    <div class="card-title">試算結果</div>
    <div class="result-grid">
      <div class="result-card hl-purple">
        <div class="result-label">每月還款</div>
        <div class="result-value" id="monthly">—</div>
        <div class="result-sub">元／月</div>
      </div>
      <div class="result-card hl-green">
        <div class="result-label">總利息支出</div>
        <div class="result-value" id="interest">—</div>
        <div class="result-sub">元</div>
      </div>
      <div class="result-card">
        <div class="result-label">總還款金額</div>
        <div class="result-value" id="total">—</div>
        <div class="result-sub">元</div>
      </div>
      <div class="result-card">
        <div class="result-label">利息佔比</div>
        <div class="result-value" id="ratio">—</div>
        <div class="result-sub">佔總還款</div>
      </div>
    </div>

    <div id="compareResult" style="display:none" class="compare-section">
      <div class="compare-title">民間借款 vs 銀行貸款</div>
      <div class="compare-bar-wrap">
        <div class="compare-label-row">
          <span>銀行貸款月付</span>
          <span id="bankMonthlyLabel" style="color:#2563EB;font-weight:600"></span>
        </div>
        <div class="bar-track"><div class="bar-fill bar-blue" id="bankBar" style="width:30%"></div></div>
      </div>
      <div class="compare-bar-wrap">
        <div class="compare-label-row">
          <span>民間借款月付（僅利息）</span>
          <span id="privateMonthlyLabel" style="color:#ff3b30;font-weight:600"></span>
        </div>
        <div class="bar-track"><div class="bar-fill bar-red" id="privateBar" style="width:80%"></div></div>
      </div>
      <div class="saving-box">
        <div style="font-size:13px;color:#16A34A;margin-bottom:4px;font-weight:600">轉貸後每月可省</div>
        <div class="saving-val" id="savingLabel">—</div>
        <div style="font-size:12px;color:#6e6e73;margin-top:4px" id="savingYearLabel"></div>
      </div>
    </div>
  </div>

  <!-- 攤還表 -->
  <div class="card">
    <div class="card-title">還款明細（逐年）</div>
    <div class="amort-table-wrap">
      <table>
        <thead>
          <tr><th>年度</th><th>年付本金</th><th>年付利息</th><th>年付合計</th><th>剩餘本金</th></tr>
        </thead>
        <tbody id="amortBody"></tbody>
      </table>
    </div>
  </div>

  <div class="cta-strip">
    <h3>想降低月付壓力？</h3>
    <p>民間借款轉銀行、多筆整合一筆，免費評估你的狀況。</p>
    <div class="cta-row">
      <a href="https://lin.ee/PHIfSoY" target="_blank" class="btn-green">加入 LINE 免費諮詢</a>
      <a href="tel:0931087996" class="btn-purple">直接來電</a>
    </div>
  </div>

</div>

<script>
let mode='bank';
function setMode(m){
  mode=m;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&m==='bank')||(i===1&&m==='private')));
  document.getElementById('privateField').style.display=m==='private'?'block':'none';
  document.getElementById('compareResult').style.display=m==='private'?'block':'none';
  calculate();
}
function syncSlider(a,b){document.getElementById(b).value=document.getElementById(a).value}
function syncInput(a,b){document.getElementById(b).value=document.getElementById(a).value}
function fmt(n){return Math.round(n).toLocaleString('zh-TW')}
function calculate(){
  const P=(parseFloat(document.getElementById('amount').value)||0)*10000;
  const annualRate=parseFloat(document.getElementById('rate').value)||0;
  const years=parseInt(document.getElementById('years').value)||0;
  const n=years*12, r=annualRate/100/12;
  if(P<=0||annualRate<=0||years<=0)return;
  const monthly=r===0?P/n:P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
  const total=monthly*n, totalInterest=total-P;
  document.getElementById('monthly').textContent=fmt(monthly);
  document.getElementById('total').textContent=fmt(total);
  document.getElementById('interest').textContent=fmt(totalInterest);
  document.getElementById('ratio').textContent=(totalInterest/total*100).toFixed(1)+'%';
  if(mode==='private'){
    const pm=parseFloat(document.getElementById('privateRate').value)/100||0;
    const priv=P*pm, saving=priv-monthly, mx=Math.max(monthly,priv);
    document.getElementById('bankBar').style.width=(monthly/mx*100).toFixed(1)+'%';
    document.getElementById('privateBar').style.width=(priv/mx*100).toFixed(1)+'%';
    document.getElementById('bankMonthlyLabel').textContent=fmt(monthly)+' 元';
    document.getElementById('privateMonthlyLabel').textContent=fmt(priv)+' 元';
    document.getElementById('savingLabel').textContent=saving>0?fmt(saving)+' 元':'—';
    document.getElementById('savingYearLabel').textContent=saving>0?'每年可省 '+fmt(saving*12)+' 元':'';
  }
  let balance=P, rows='';
  for(let y=1;y<=years;y++){
    let yp=0,yi=0;
    for(let m=0;m<12;m++){const ip=balance*r;const pp=monthly-ip;yi+=ip;yp+=pp;balance-=pp;if(balance<0)balance=0;}
    rows+=`<tr><td>第 ${y} 年</td><td>${fmt(yp)}</td><td>${fmt(yi)}</td><td>${fmt(yp+yi)}</td><td>${fmt(Math.max(0,balance))}</td></tr>`;
  }
  document.getElementById('amortBody').innerHTML=rows;
}
calculate();
</script>
<div data-include="footer"></div>
</body>
</html>
